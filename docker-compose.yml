services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: devtraining
      POSTGRES_PASSWORD: devtraining
      POSTGRES_DB: devtraining
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devtraining"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ./app
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://devtraining:devtraining@db:5432/devtraining
      AUTH_SECRET: change-me-in-production-use-openssl-rand-base64-32
      AUTH_URL: http://localhost:3000
      NODE_ENV: development
    volumes:
      # ソースコードをマウント（ホットリロード対応）
      - ./app:/app
      # node_modules と生成ファイルはコンテナ内を優先
      - /app/node_modules
      - /app/.next
      - /app/src/generated
    depends_on:
      db:
        condition: service_healthy
    # 起動時にマイグレーション → Prisma生成 → 開発サーバー起動
    command: >
      sh -c "npx prisma migrate deploy &&
             npx prisma generate &&
             npm run dev"

volumes:
  postgres_data:
